<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FitTrack - מוכן לשימוש</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--p:#1E3A5F;--pl:#2C5282;--a:#3B82F6;--al:#EFF6FF;--am:#BFDBFE;--ok:#059669;--okl:#ECFDF5;--wn:#D97706;--wnl:#FFFBEB;--er:#DC2626;--erl:#FEF2F2;--t:#111827;--t2:#6B7280;--t3:#9CA3AF;--bg:#F3F4F6;--s:#fff;--bd:#E5E7EB;--bdl:#F9FAFB;--r:16px;--rs:10px;--sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04)}
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
        html,body{height:100%;font-family:'Heebo',sans-serif;color:var(--t);background:var(--bg);overflow:hidden}
        
        /* Splash Screen */
        #sp{position:fixed;inset:0;background:var(--p);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s}
        #sp.gone{opacity:0;visibility:hidden;pointer-events:none}
        .sp-logo{width:76px;height:76px;background:var(--pl);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;color:#fff;margin-bottom:14px}
        .sp-spin{margin-top:34px;width:26px;height:26px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}

        .app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;background:var(--bg)}
        .hdr{background:var(--p);padding:48px 18px 14px;color:white}
        .hdr-in{display:flex;justify-content:space-between;align-items:center}
        .scrl{flex:1;overflow-y:auto;padding:14px 14px 100px}
        .pg{display:none}.pg.on{display:block}

        /* UI Elements */
        .card{background:var(--s);border-radius:var(--r);border:1px solid var(--bd);margin-bottom:11px;padding:15px;box-shadow:var(--sh)}
        .ch{display:flex;justify-content:space-between;margin-bottom:10px;font-weight:700;color:var(--t3);font-size:12px}
        .nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--s);display:flex;padding:10px 0;border-top:1px solid var(--bd)}
        .nb{flex:1;background:none;border:none;text-align:center;cursor:pointer;font-family:inherit}
        .nb.on{color:var(--a)}
        
        /* Modal */
        .ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end}
        .ovl.on{display:flex}
        .mdl{background:#fff;width:100%;padding:20px;border-radius:20px 20px 0 0}
        .inp{width:100%;padding:10px;margin:5px 0 15px;border:1px solid var(--bd);border-radius:8px}
        .subbtn{width:100%;padding:12px;background:var(--a);color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer}
    </style>
</head>
<body>

<div id="sp">
    <div class="sp-logo">FT</div>
    <div class="sp-spin"></div>
</div>

<div class="app">
    <div class="hdr">
        <div class="hdr-in">
            <div><div id="greet">שלום,</div><div id="hdrN" style="font-weight:700">משתמש</div></div>
            <div id="hdrDate">טוען...</div>
        </div>
    </div>

    <div class="scrl">
        <div class="pg on" id="pg-home">
            <div class="card">
                <div class="ch">קלוריות היום <span id="calPct">0%</span></div>
                <h2 id="calN">0</h2>
                <p style="font-size: 12px; color: var(--t2)">מתוך יעד של <span id="goalD">2000</span> קלוריות</p>
            </div>

            <div class="card">
                <div class="ch">שתיית מים</div>
                <div id="wBdg" style="font-size: 18px; font-weight: 700;">0 / 2.5 ליטר</div>
                <button onclick="addWater(0.25)" class="subbtn" style="margin-top:10px; background: var(--p)">+ כוס מים</button>
            </div>
        </div>

        <div class="pg" id="pg-settings">
            <div class="card">
                <div class="ch">הגדרות פרופיל</div>
                <label>שם:</label>
                <input type="text" id="sName" class="inp" placeholder="הכנס שם">
                <label>יעד קלוריות יומי:</label>
                <input type="number" id="gCal" class="inp" value="2000">
                <button onclick="saveSettings()" class="subbtn">שמור הגדרות</button>
            </div>
        </div>
    </div>

    <div class="nav">
        <button class="nb on" onclick="go('home', this)">🏠<br>בית</button>
        <button class="nb" onclick="go('settings', this)">⚙️<br>הגדרות</button>
    </div>
</div>

<script>
    // הגדרות בסיסיות וטעינה ראשונית
    document.addEventListener('DOMContentLoaded', () => {
        // הסרת Splash Screen לאחר שנייה
        setTimeout(() => {
            document.getElementById('sp').classList.add('gone');
        }, 1000);

        // עדכון תאריך
        const now = new Date();
        document.getElementById('hdrDate').textContent = now.toLocaleDateString('he-IL');

        // טעינת נתונים שמורים
        loadData();
    });

    // ניהול ניווט
    function go(pageId, btn) {
        document.querySelectorAll('.pg').forEach(p => p.classList.remove('on'));
        document.getElementById('pg-' + pageId).classList.add('on');
        
        document.querySelectorAll('.nb').forEach(b => b.classList.remove('on'));
        btn.classList.add('on');
    }

    // פונקציות מים
    let waterLevel = 0;
    function addWater(amount) {
        waterLevel += amount;
        document.getElementById('wBdg').textContent = waterLevel.toFixed(2) + " / 2.5 ליטר";
        saveData();
    }

    // שמירה וטעינה מ-LocalStorage
    function saveSettings() {
        const name = document.getElementById('sName').value;
        const goal = document.getElementById('gCal').value;
        
        localStorage.setItem('ft_name', name);
        localStorage.setItem('ft_goal', goal);
        
        updateUI(name, goal);
        alert('הגדרות נשמרו!');
    }

    function loadData() {
        const name = localStorage.getItem('ft_name') || "אורח";
        const goal = localStorage.getItem('ft_goal') || 2000;
        
        document.getElementById('sName').value = name;
        document.getElementById('gCal').value = goal;
        
        updateUI(name, goal);
    }

    function updateUI(name, goal) {
        document.getElementById('hdrN').textContent = name;
        document.getElementById('goalD').textContent = goal;
    }

    function saveData() {
        localStorage.setItem('ft_water', waterLevel);
    }
</script>

</body>
</html>
